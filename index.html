<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreador Multi-Dispositivos</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body style="text-align:center; font-family:sans-serif; padding-top:50px; background:#f0f2f5;">
    <div style="background:white; padding:30px; border-radius:15px; display:inline-block; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
        <h2>Rastreador GPS</h2>
        <p id="dev-id" style="color:#888;"></p>
        <button id="btn" onclick="toggleGPS()" style="padding:20px; width:200px; background:#28a745; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">INICIAR</button>
        <p id="status">Status: Offline</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCWUj1EeqGK9bsFVBhSt2tQHLfdl3mC0kQ",
            databaseURL: "https://projeto-devmobile-16ceb-default-rtdb.firebaseio.com",
            projectId: "projeto-devmobile-16ceb",
            appId: "1:74789381923:web:f4f01cd5439ca895730e96"
        };
        firebase.initializeApp(firebaseConfig);

        // Gera um ID único para este celular para não atropelar outros dispositivos
        const deviceId = "Celular_" + Math.floor(Math.random() * 9000 + 1000);
        document.getElementById('dev-id').innerText = "ID do Aparelho: " + deviceId;

        let watchId = null;

        function toggleGPS() {
            const btn = document.getElementById('btn');
            if (!watchId) {
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude, deviceId: deviceId };
                    // Salva no nó específico deste ID
                    firebase.database().ref('dispositivos/' + deviceId).set(coords);
                    document.getElementById('status').innerText = "Enviando localização...";
                }, (err) => alert(err.message), { enableHighAccuracy: true });
                btn.innerText = "PARAR";
                btn.style.background = "#dc3545";
            } else {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                firebase.database().ref('dispositivos/' + deviceId).remove();
                btn.innerText = "INICIAR";
                btn.style.background = "#28a745";
                document.getElementById('status').innerText = "Status: Parado";
            }
        }
    </script>
</body>
</html>
