<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Tracker - Dispositivo</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #121212; color: white; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 85%; }
        button { width: 100%; padding: 20px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .on { background: #28a745; color: white; }
        .off { background: #dc3545; color: white; }
        #status { margin-top: 20px; font-size: 0.9rem; color: #bbb; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="dev-name">Aguardando ID...</h2>
        <button id="btn" class="on" onclick="toggleGPS()">INICIAR RASTREIO</button>
        <p id="status">Status: Desconectado</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCWUj1EeqGK9bsFVBhSt2tQHLfdl3mC0kQ",
            databaseURL: "https://projeto-devmobile-16ceb-default-rtdb.firebaseio.com",
            projectId: "projeto-devmobile-16ceb",
            appId: "1:74789381923:web:f4f01cd5439ca895730e96"
        };
        firebase.initializeApp(firebaseConfig);

        // Gera um ID único para este celular
        const deviceId = "GPS_" + Math.floor(Math.random() * 8999 + 1000);
        document.getElementById('dev-name').innerText = deviceId;

        let watchId = null;

        function toggleGPS() {
            const btn = document.getElementById('btn');
            if (!watchId) {
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const dados = {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        horario: Date.now(),
                        status: "Online"
                    };
                    firebase.database().ref('dispositivos/' + deviceId).set(dados);
                    document.getElementById('status').innerText = "📍 Transmitindo em tempo real...";
                }, (err) => alert("Erro GPS: " + err.message), { enableHighAccuracy: true });
                
                btn.innerText = "PARAR RASTREIO";
                btn.className = "off";
            } else {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                // Mantém a posição mas avisa que está Offline
                firebase.database().ref('dispositivos/' + deviceId + '/status').set("Offline");
                btn.innerText = "INICIAR RASTREIO";
                btn.className = "on";
                document.getElementById('status').innerText = "Status: Parado (Última salva)";
            }
        }
    </script>
</body>
</html>
