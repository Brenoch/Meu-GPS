<!DOCTYPE html>
<html>
<head>
    <title>Monitor Satélite Grátis</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        #map { height: 100vh; width: 100%; margin: 0; }
        .painel { position: absolute; top: 10px; left: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-family: sans-serif; }
    </style>
</head>
<body>
    <div class="painel">
        <div id="status">Aguardando GPS...</div>
    </div>
    <div id="map"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCWUj1EeqGK9bsFVBhSt2tQHLfdl3mC0kQ",
            databaseURL: "https://projeto-devmobile-16ceb-default-rtdb.firebaseio.com",
            projectId: "projeto-devmobile-16ceb",
            appId: "1:74789381923:web:f4f01cd5439ca895730e96"
        };
        firebase.initializeApp(firebaseConfig);

        // Inicializa o mapa
        const map = L.map('map').setView([-15.78, -47.92], 4);

        // CAMADA DE SATÉLITE GRÁTIS (Parece o Google Earth)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EBP, and the GIS User Community'
        }).addTo(map);

        let marker = L.marker([0, 0]).addTo(map);

        firebase.database().ref('localizacao_viva').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.lat && data.lng) {
                document.getElementById('status').innerText = "📍 Sinal Recebido!";

                // Delay de 5 segundos e Zoom
                setTimeout(() => {
                    const pos = [data.lat, data.lng];
                    marker.setLatLng(pos);
                    map.setView(pos, 18); // Zoom máximo para ver detalhes
                }, 5000);
            }
        });
    </script>
</body>
</html>
