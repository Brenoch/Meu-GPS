<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitor de Frota Profissional</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map { height: 100vh; width: 100%; }
        .info-box { position: absolute; top: 20px; left: 60px; z-index: 1000; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-left: 5px solid #0056b3; }
    </style>
</head>
<body>

    <div class="info-box">
        <b style="color: #0056b3;">CENTRAL DE MONITORAMENTO</b><br>
        <small id="track-count">Buscando dispositivos...</small>
    </div>
    <div id="map"></div>

    <script>
        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCWUj1EeqGK9bsFVBhSt2tQHLfdl3mC0kQ",
            databaseURL: "https://projeto-devmobile-16ceb-default-rtdb.firebaseio.com",
            projectId: "projeto-devmobile-16ceb",
            appId: "1:74789381923:web:f4f01cd5439ca895730e96"
        };
        firebase.initializeApp(firebaseConfig);

        const map = L.map('map').setView([-15.78, -47.92], 4);

        // MAPA BONITO (ESTILO MODERNO COM RUAS) - Stadia Maps
        // Substitua 'SUA_API_KEY' pela chave que você pegar no site do Stadia Maps
        const apiKey = '76cef680-5c3f-429e-8958-5d1cba8f0084';
        L.tileLayer(`https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png?api_key=${apiKey}`, {
            maxZoom: 20,
            attribution: '&copy; Stadia Maps, &copy; OpenStreetMap contributors'
        }).addTo(map);

        // ÍCONE DE ÔNIBUS
        const iconOnibus = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',
            iconSize: [45, 45],
            iconAnchor: [22, 45],
            popupAnchor: [0, -45]
        });

        let markers = {};
        let primeiraVez = true;

        firebase.database().ref('dispositivos').on('value', (snapshot) => {
            const dataList = snapshot.val();
            if (!dataList) return;

            const ids = Object.keys(dataList);
            document.getElementById('track-count').innerText = `${ids.length} ônibus ativos`;

            ids.forEach((id) => {
                const info = dataList[id];
                const pos = [info.lat, info.lng];
                const popupTxt = `<b>Ônibus:</b> ${id}<br><b>Status:</b> ${info.status}`;

                if (!markers[id]) {
                    markers[id] = L.marker(pos, { icon: iconOnibus }).addTo(map).bindPopup(popupTxt);
                    if (primeiraVez) {
                        map.setView(pos, 16); // Zoom suave na primeira detecção
                        primeiraVez = false;
                    }
                } else {
                    // O delay de 5 segundos que você pediu
                    setTimeout(() => {
                        markers[id].setLatLng(pos).setPopupContent(popupTxt);
                    }, 5000);
                }
            });
        });
    </script>
</body>
</html>
