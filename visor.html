<!DOCTYPE html>
<html>
<head>
    <title>Monitor Satélite Híbrido</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style> #map { height: 100vh; width: 100%; } </style>
</head>
<body>
    <div id="map"></div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCWUj1EeqGK9bsFVBhSt2tQHLfdl3mC0kQ",
            databaseURL: "https://projeto-devmobile-16ceb-default-rtdb.firebaseio.com",
            projectId: "projeto-devmobile-16ceb",
            appId: "1:74789381923:web:f4f01cd5439ca895730e96"
        };
        firebase.initializeApp(firebaseConfig);

        const map = L.map('map').setView([-15.78, -47.92], 4);
        
        // MAPA SATÉLITE COM NOMES DE RUAS (Esri Hybrid)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}').addTo(map);

        let markers = {}; // Objeto para guardar os marcadores de cada celular
        let primeiraVez = true;

        firebase.database().ref('dispositivos').on('value', (snapshot) => {
            const dispositivos = snapshot.val();
            
            if (dispositivos) {
                Object.keys(dispositivos).forEach((id) => {
                    const data = dispositivos[id];
                    const pos = [data.lat, data.lng];

                    // Se o marcador deste celular não existe, cria um
                    if (!markers[id]) {
                        markers[id] = L.marker(pos).addTo(map).bindPopup(id).openPopup();
                    } else {
                        // Se já existe, apenas move (com o delay de 5s que você pediu)
                        setTimeout(() => {
                            markers[id].setLatLng(pos);
                        }, 5000);
                    }

                    // APROXIMAÇÃO: Só faz o zoom na primeira vez que o site recebe QUALQUER dado
                    if (primeiraVez) {
                        map.setView(pos, 17);
                        primeiraVez = false;
                    }
                });
            }
        });

        // Remove marcadores se o dispositivo sair do banco
        firebase.database().ref('dispositivos').on('child_removed', (snapshot) => {
            const id = snapshot.key;
            if (markers[id]) {
                map.removeLayer(markers[id]);
                delete markers[id];
            }
        });
    </script>
</body>
</html>
