<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitor Satélite Híbrido - Multi-GPS</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { height: 100vh; width: 100%; }
        .legend { position: absolute; top: 10px; right: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; font-family: sans-serif; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="legend"><b>Monitor de Frota</b><br>Satélite Híbrido Ativo</div>
    <div id="map"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCWUj1EeqGK9bsFVBhSt2tQHLfdl3mC0kQ",
            databaseURL: "https://projeto-devmobile-16ceb-default-rtdb.firebaseio.com",
            projectId: "projeto-devmobile-16ceb",
            appId: "1:74789381923:web:f4f01cd5439ca895730e96"
        };
        firebase.initializeApp(firebaseConfig);

        const map = L.map('map').setView([-15.78, -47.92], 4);

        // Camada 1: Satélite (Esri World Imagery)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        // Camada 2: Nomes de Ruas e Fronteiras (Esri Hybrid Overlay)
        L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}').addTo(map);

        let markers = {};
        let primeiraVez = true;

        function formatarTempo(ts) {
            const diff = Math.floor((Date.now() - ts) / 1000);
            if (diff < 60) return `agora`;
            return `há ${Math.floor(diff/60)} min`;
        }

        firebase.database().ref('dispositivos').on('value', (snapshot) => {
            const lista = snapshot.val();
            if (!lista) return;

            Object.keys(lista).forEach((id) => {
                const data = lista[id];
                const pos = [data.lat, data.lng];
                const popupContent = `<b>ID:</b> ${id}<br><b>Status:</b> ${data.status}<br><b>Visto:</b> ${formatarTempo(data.horario)}`;

                if (!markers[id]) {
                    // Cria marcador novo
                    markers[id] = L.marker(pos).addTo(map).bindPopup(popupContent);
                    if (primeiraVez) {
                        map.setView(pos, 17); // Zoom apenas na primeira vez que o site abre
                        primeiraVez = false;
                    }
                } else {
                    // Delay de 5 segundos solicitado
                    setTimeout(() => {
                        markers[id].setLatLng(pos).setPopupContent(popupContent);
                    }, 5000);
                }
            });
        });
    </script>
</body>
</html>
