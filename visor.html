<!DOCTYPE html>
<html>
<head>
    <title>Visor Google Maps - Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=SUA_CHAVE_AQUI&callback=initMap" async defer></script>
    <style>
        #map { height: 100vh; width: 100%; }
        .painel { position: absolute; top: 10px; left: 10px; z-index: 5; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.3); font-family: Arial; }
    </style>
</head>
<body>
    <div class="painel">
        <div id="status">Aguardando sinal do celular...</div>
    </div>
    <div id="map"></div>

    <script>
        let map, marker;

        // Configurações do seu Firebase (extraídas da sua imagem anterior)
        const firebaseConfig = {
            apiKey: "AIzaSyCWUj1EeqGK9bsFVBhSt2tQHLfdl3mC0kQ",
            databaseURL: "https://projeto-devmobile-16ceb-default-rtdb.firebaseio.com",
            projectId: "projeto-devmobile-16ceb",
            appId: "1:74789381923:web:f4f01cd5439ca895730e96"
        };
        firebase.initializeApp(firebaseConfig);

        function initMap() {
            // Inicializa o mapa focado no Brasil
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 4,
                center: { lat: -15.78, lng: -47.92 },
            });
            marker = new google.maps.Marker({ map: map });

            // Escuta o nó 'localizacao_viva' que o celular envia
            firebase.database().ref('localizacao_viva').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.lat && data.lng) {

                    // Aplica o delay de 5 segundos que você solicitou
                    setTimeout(() => {
                        const pos = { lat: data.lat, lng: data.lng };

                        marker.setPosition(pos);
                        map.setCenter(pos);
                        map.setZoom(17); // Zoom aproximado para ver a rua

                        document.getElementById('status').innerText = "Localização Atualizada!";
                    }, 5000);
                }
            });
        }
    </script>
</body>
</html>
