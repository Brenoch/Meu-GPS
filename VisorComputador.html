<!DOCTYPE html>
<html>
<head>
    <title>Monitor em Tempo Real</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        #map { height: 100vh; width: 100%; }
        .info { position: absolute; top: 10px; left: 50px; z-index: 1000; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="info">
        <div id="status">Aguardando sinal... (Delay 5s)</div>
    </div>
    <div id="map"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCWUj1EeqGK9bsFVBhSt2tQHLfdl3mC0kQ",
            databaseURL: "https://projeto-devmobile-16ceb-default-rtdb.firebaseio.com",
            projectId: "projeto-devmobile-16ceb",
            appId: "1:74789381923:web:f4f01cd5439ca895730e96"
        };
        firebase.initializeApp(firebaseConfig);

        // Inicializa o Mapa focado no Brasil (ajusta sozinho depois)
        const map = L.map('map').setView([-15.78, -47.92], 4);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let marker = L.marker([0, 0]).addTo(map);

        firebase.database().ref('localizacao_viva').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('status').innerText = "Sinal recebido! Processando delay...";

                // O delay de 5 segundos que você pediu
                setTimeout(() => {
                    const newPos = [data.lat, data.lng];
                    marker.setLatLng(newPos);
                    map.setView(newPos, 16); // Dá zoom no celular
                    document.getElementById('status').innerText = "Localização Exata Atualizada";
                }, 5000);
            }
        });
    </script>
</body>
</html>
